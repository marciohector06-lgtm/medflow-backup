version: '3.8'

services:
  db:
    image: postgres:15
    container_name: medflow_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: medflow_password
      POSTGRES_DB: medflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: